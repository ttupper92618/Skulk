site_name: Skulk Developer Docs
site_description: Developer documentation for Skulk
repo_url: https://github.com/Foxlight-Foundation/Skulk
theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: amber
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

docs_dir: docs
site_dir: site

extra_css:
  - css/custom.css

nav:
  - Home: index.md
  - Getting Started:
      - API Guide: api.md
      - Model Store: model-store.md
      - KV Cache Backends: kv-cache-backends.md
      - Architecture: architecture.md
  - Reference:
      - OpenAPI Schema: reference/openapi.md
      - API Reference: reference/api-reference.md
      - TypeDoc: reference/typedoc.md
